# This rule is not used by the project crd-sakura-simple-monitor itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to monitoring.k8s.azuki.blue resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: crd-sakura-simple-monitor
    app.kubernetes.io/managed-by: kustomize
  name: sakurasimplemonitor-viewer-role
rules:
- apiGroups:
  - monitoring.k8s.azuki.blue
  resources:
  - sakurasimplemonitors
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - monitoring.k8s.azuki.blue
  resources:
  - sakurasimplemonitors/status
  verbs:
  - get
