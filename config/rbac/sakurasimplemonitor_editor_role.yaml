# This rule is not used by the project crd-sakura-simple-monitor itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the monitoring.k8s.azuki.blue.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: crd-sakura-simple-monitor
    app.kubernetes.io/managed-by: kustomize
  name: sakurasimplemonitor-editor-role
rules:
- apiGroups:
  - monitoring.k8s.azuki.blue
  resources:
  - sakurasimplemonitors
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - monitoring.k8s.azuki.blue
  resources:
  - sakurasimplemonitors/status
  verbs:
  - get
