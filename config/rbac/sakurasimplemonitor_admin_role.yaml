# This rule is not used by the project crd-sakura-simple-monitor itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over monitoring.k8s.azuki.blue.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: crd-sakura-simple-monitor
    app.kubernetes.io/managed-by: kustomize
  name: sakurasimplemonitor-admin-role
rules:
- apiGroups:
  - monitoring.k8s.azuki.blue
  resources:
  - sakurasimplemonitors
  verbs:
  - '*'
- apiGroups:
  - monitoring.k8s.azuki.blue
  resources:
  - sakurasimplemonitors/status
  verbs:
  - get
