name: Container Image

on:
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".github/workflows/container-image.yml"
  push:
    branches:
      - master
    tags:
      - "*"
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".github/workflows/container-image.yml"

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/crd-sakura-simple-monitor

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: image-tags
        run: |
          {
            echo "tags<<EOF"
            if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              echo "${IMAGE_NAME}:${GITHUB_REF_NAME}"
              echo "${IMAGE_NAME}:latest"
            else
              echo "${IMAGE_NAME}:latest"
              echo "${IMAGE_NAME}:${GITHUB_SHA}"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')) }}
          tags: ${{ steps.image-tags.outputs.tags }}
